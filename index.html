<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Escolar v4.7 | Prof. Eduardo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --success: #16a34a; --edit: #f59e0b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 60px; }
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: var(--primary); position: fixed; width: 100%; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 24px; text-align: center; width: 90%; max-width: 400px; }
        nav.tabs { display: flex; background: var(--primary); padding: 8px; position: sticky; top: 0; z-index: 100; overflow-x: auto; gap: 8px; }
        .tab-btn { flex: 0 0 auto; padding: 12px 18px; border: none; background: rgba(255,255,255,0.1); color: #cbd5e1; font-size: 0.8rem; font-weight: 700; border-radius: 10px; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: white; }
        header { background: white; padding: 15px; border-bottom: 2px solid #e2e8f0; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        select, input, textarea { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        .btn-main { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        
        /* Sistema de Vistos Visual */
        .visto-toggle { 
            width: 32px; height: 32px; border: 2px solid #e2e8f0; border-radius: 8px; 
            display: inline-flex; align-items: center; justify-content: center; 
            cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.2s;
            margin-left: 4px; background: #fff; color: transparent;
        }
        .visto-toggle.checked { background: #dcfce7; border-color: var(--success); color: var(--success); }
        
        .aluno-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f5f9; }
        .edit-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
        .hist-chip { display: inline-block; background: #e2e8f0; padding: 8px 12px; border-radius: 20px; font-size: 0.8rem; margin: 4px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <h2>Connect Escolar v4.7</h2>
            <input type="password" id="pass" placeholder="Senha" onkeydown="if(event.key==='Enter') logar()">
            <button onclick="logar()" class="btn-main btn-blue">Entrar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="tabs no-print">
            <button class="tab-btn active" onclick="aba('v')">VISTOS</button>
            <button class="tab-btn" onclick="aba('d')">DIÁRIO</button>
            <button class="tab-btn" onclick="aba('rd')">RELATÓRIO</button>
            <button class="tab-btn" onclick="aba('r')">RECUPERAÇÃO</button>
            <button class="tab-btn" onclick="aba('l')">FECHAMENTO</button>
            <button class="tab-btn" onclick="aba('c')">AJUSTES</button>
        </nav>

        <header class="no-print">
            <div class="controls-grid">
                <select id="turma" onchange="atualizarTudo()" style="grid-column: span 2; font-weight: bold;">
                    <option value="">Selecione a Turma...</option>
                    <optgroup label="ENSINO FUNDAMENTAL">
                        <option value="9ºA Pensamento Comp">9ºA Pensamento Comp</option>
                        <option value="9ºB Pensamento Comp">9ºB Pensamento Comp</option>
                        <option value="9ºC Letramento Digital">9ºC Letramento Digital</option>
                        <option value="9ºD Letramento Digital">9ºD Letramento Digital</option>
                        <option value="9ºA Geografia">9ºA Geografia</option>
                        <option value="9ºB Geografia">9ºB Geografia</option>
                        <option value="9ºC Geografia">9ºC Geografia</option>
                    </optgroup>
                    <optgroup label="ENSINO MÉDIO">
                        <option value="1ºB Sociologia">1ºB Sociologia</option>
                        <option value="2ºB Sociologia">2ºB Sociologia</option>
                        <option value="2ºC Sociologia">2ºC Sociologia</option>
                        <option value="2ºD Sociologia">2ºD Sociologia</option>
                    </optgroup>
                    <optgroup label="TÉCNICOS / DG">
                        <option value="1ºB IFA">1ºB IFA</option>
                        <option value="1ºA DG História">1ºA DG História</option>
                        <option value="2ºA DG História">2ºA DG História</option>
                        <option value="2ºB DG História">2ºB DG História</option>
                        <option value="2ºA DG Filosofia">2ºA DG Filosofia</option>
                        <option value="2ºB DG Filosofia">2ºB DG Filosofia</option>
                    </optgroup>
                </select>
                <select id="bimestre" onchange="atualizarTudo()">
                    <option value="1B">1º Bimestre</option>
                    <option value="2B" selected>2º Bimestre</option>
                    <option value="3B">3º Bimestre</option>
                    <option value="4B">4º Bimestre</option>
                </select>
                <input type="date" id="data" onchange="carregarAlunos()">
            </div>
        </header>

        <div class="container">
            <!-- ABA VISTOS -->
            <div id="aba-v" class="card tab-content">
                <div id="header-inputs" style="display:flex; overflow-x:auto; gap:5px; margin-bottom:15px;"></div>
                <div id="lista-container">Aguardando seleção de turma...</div>
                <button onclick="salvarVistos()" class="btn-main btn-blue">Salvar Vistos ✓</button>
                <div id="hist-vistos-lista" style="margin-top:20px;"></div>
            </div>

            <!-- ABA AJUSTES (EDIÇÃO DE NOMES) -->
            <div id="aba-c" class="card tab-content hidden">
                <h4>Adicionar Aluno</h4>
                <div class="edit-row">
                    <input type="text" id="novo-aluno-nome" placeholder="Nome completo">
                    <button onclick="adicionarUmAluno()" class="btn-blue" style="padding:12px; border-radius:12px; border:none; width:80px;">+</button>
                </div>
                <hr>
                <h4>Gerenciar Alunos da Turma</h4>
                <div id="lista-edicao-alunos"> Selecione uma turma para editar nomes...</div>
                <hr>
                <textarea id="imp" placeholder="Importação em massa (um por linha)"></textarea>
                <button onclick="importar()" class="btn-main btn-blue">Substituir Toda a Lista</button>
            </div>

            <!-- OUTRAS ABAS (DIÁRIO, RELATÓRIO, REC, FECHAMENTO) -->
            <div id="aba-d" class="card tab-content hidden">
                <textarea id="cont" placeholder="Conteúdo da aula..." style="height: 120px;"></textarea>
                <button onclick="salvarD()" class="btn-main btn-blue">Gravar Diário</button>
            </div>
            <div id="aba-rd" class="card tab-content hidden"><h3>Relatório Diário</h3><div id="relatorio-diario-corpo"></div></div>
            <div id="aba-r" class="card tab-content hidden"><h3>Recuperação</h3><div id="lista-rec"></div><button onclick="salvarRec()" class="btn-main btn-blue">Salvar Notas</button></div>
            <div id="aba-l" class="card tab-content hidden"><h3>Fechamento</h3><div id="lista-fechamento"></div></div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://connect-escolar-fdef0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();

        function logar() { if(document.getElementById('pass').value === '2203') { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app').classList.remove('hidden'); } }

        function aba(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-' + id).classList.remove('hidden');
            if(event) event.currentTarget.classList.add('active');
            if(id === 'c') carregarListaEdicao();
            if(id === 'l') carregarFechamento();
        }

        async function carregarAlunos() {
            const t = document.getElementById('turma').value; const b = document.getElementById('bimestre').value; const d = document.getElementById('data').value;
            if(!t) return;
            const [sH, sA, sV] = await Promise.all([db.ref(`headers/${t}/${b}`).once('value'), db.ref('turmas/'+t).once('value'), db.ref(`vistos/${t}/${b}/${d}`).once('value')]);
            const al = sA.val() || []; const v = sV.val() || {}; const h = sH.val() || {};
            
            let hH = ''; for(let i=1; i<=5; i++) hH += `<input type="text" id="h${i}" value="${h['h'+i] || 'Ativ '+i}" onchange="salvarHeader()" style="font-size:0.7rem; min-width:80px; text-align:center;">`;
            document.getElementById('header-inputs').innerHTML = hH;

            let html = '';
            al.forEach((n, idx) => {
                html += `<div class="aluno-row"><span>${n}</span><div>`;
                for(let j=1; j<=5; j++) {
                    const isChecked = (v[idx] && v[idx][j]);
                    html += `<div class="visto-toggle ${isChecked?'checked':''}" onclick="toggleVisto(this)" data-idx="${idx}" data-v="${j}">${isChecked?'✓':''}</div>`;
                }
                html += `</div></div>`;
            });
            document.getElementById('lista-container').innerHTML = html || "Nenhum aluno cadastrado.";
            carregarHistVistos();
        }

        function toggleVisto(el) {
            el.classList.toggle('checked');
            el.innerText = el.classList.contains('checked') ? '✓' : '';
        }

        async function carregarListaEdicao() {
            const t = document.getElementById('turma').value;
            if(!t) return;
            const s = await db.ref('turmas/'+t).once('value');
            const al = s.val() || [];
            let html = '';
            al.forEach((n, i) => {
                html += `<div class="edit-row">
                    <input type="text" value="${n}" id="edit-n-${i}">
                    <button onclick="renomearAluno(${i})" style="background:var(--edit); color:white; border:none; padding:10px; border-radius:8px;">💾</button>
                </div>`;
            });
            document.getElementById('lista-edicao-alunos').innerHTML = html;
        }

        async function renomearAluno(idx) {
            const t = document.getElementById('turma').value;
            const novoNome = document.getElementById(`edit-n-${idx}`).value;
            const s = await db.ref('turmas/'+t).once('value');
            let lista = s.val();
            lista[idx] = novoNome;
            await db.ref('turmas/'+t).set(lista);
            alert("Nome atualizado!");
        }

        async function salvarVistos() {
            const t = document.getElementById('turma').value; const b = document.getElementById('bimestre').value; const d = document.getElementById('data').value;
            if(!t) return;
            let dados = {}; 
            document.querySelectorAll('.visto-toggle').forEach(el => {
                const i = el.dataset.idx; const v = el.dataset.v;
                if(!dados[i]) dados[i] = {};
                dados[i][v] = el.classList.contains('checked');
            });
            await db.ref(`vistos/${t}/${b}/${d}`).set(dados);
            alert("Vistos salvos com sucesso! ✓");
            carregarHistVistos();
        }

        async function carregarFechamento() {
            const t = document.getElementById('turma').value; const b = document.getElementById('bimestre').value;
            const [sA, sV, sR] = await Promise.all([db.ref('turmas/'+t).once('value'), db.ref(`vistos/${t}/${b}`).once('value'), db.ref(`recuperacao/${t}/${b}`).once('value')]);
            const al = sA.val() || []; const vistos = sV.val() || {}; const rec = sR.val() || {};
            let html = '<table style="width:100%"><tr><th>Estudante</th><th>Total ✓</th><th>Rec</th></tr>';
            al.forEach((n, idx) => {
                let total = 0;
                Object.values(vistos).forEach(dia => { if(dia[idx]) Object.values(dia[idx]).forEach(v => { if(v) total++; })});
                html += `<tr><td>${n}</td><td style="color:var(--success); font-weight:bold">${total}</td><td>${rec[idx] || '-'}</td></tr>`;
            });
            document.getElementById('lista-fechamento').innerHTML = html + '</table>';
        }

        async function adicionarUmAluno() {
            const t = document.getElementById('turma').value; const nome = document.getElementById('novo-aluno-nome').value.trim();
            if(!t || !nome) return alert("Dados incompletos!");
            const s = await db.ref('turmas/'+t).once('value');
            let lista = s.val() || []; lista.push(nome); lista.sort();
            await db.ref('turmas/'+t).set(lista);
            document.getElementById('novo-aluno-nome').value = ""; carregarListaEdicao(); alert("Aluno adicionado!");
        }

        async function carregarHistVistos() {
            const t = document.getElementById('turma').value; const b = document.getElementById('bimestre').value;
            const s = await db.ref(`vistos/${t}/${b}`).once('value');
            let h = '<b>Histórico:</b><br>';
            Object.keys(s.val() || {}).sort().reverse().forEach(dt => { h += `<span class="hist-chip" onclick="abrirData('${dt}')">${dt.split('-').reverse().join('/')}</span>`; });
            document.getElementById('hist-vistos-lista').innerHTML = h;
        }

        function abrirData(d) { document.getElementById('data').value = d; carregarAlunos(); }
        function atualizarTudo() { carregarAlunos(); carregarHistVistos(); }
        function salvarHeader() { const t = document.getElementById('turma').value; const b = document.getElementById('bimestre').value; let h = {}; for(let i=1; i<=5; i++) h['h'+i] = document.getElementById('h'+i).value; db.ref(`headers/${t}/${b}`).set(h); }
        async function importar() { const t = document.getElementById('turma').value; const l = document.getElementById('imp').value.split('\n').filter(n => n.length > 2).sort(); await db.ref('turmas/'+t).set(l); alert("Lista sincronizada!"); carregarListaEdicao(); }
        
        document.getElementById('data').valueAsDate = new Date();
    </script>
</body>
</html>
