<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Escolar 3.0 | Prof. Eduardo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --card: #ffffff; --text: #334155; --success: #10b981; --rec: #ef4444; --edit: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
        
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); width: 85%; max-width: 350px; }
        
        nav.tabs { display: flex; background: var(--primary); padding: 8px; gap: 5px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 10px; border: none; background: transparent; color: #94a3b8; font-weight: 600; font-size: 0.75rem; border-radius: 10px; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: white; }

        header { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 900px; margin: auto; }
        
        select, input, textarea { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 0.95rem; outline: none; background: #fff; }

        .container { padding: 15px; max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .nome-aluno { font-weight: 500; color: var(--primary); min-width: 150px; }

        .ativ-header { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 10px; align-items: center; }
        .ativ-header input { font-size: 0.7rem; text-align: center; padding: 8px; min-width: 60px; max-width: 80px; background: #f8fafc; font-weight: bold; }
        .btn-add-col { background: var(--accent); color: white; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 20px; cursor: pointer; flex-shrink: 0; }

        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: white; }
        
        .hist-item { background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 5px solid var(--accent); position: relative; }
        .btn-edit-small { position: absolute; right: 10px; top: 10px; background: #fff; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; color: var(--edit); font-weight: bold; }
        
        .relatorio-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .badge-vistos { background: var(--accent); color: white; padding: 2px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Connect Escolar 3.0</h2>
            <input type="password" id="pass" placeholder="Senha" style="width:100%; box-sizing:border-box;" onkeydown="if(event.key==='Enter') logar()">
            <button onclick="logar()" class="btn-main btn-blue">Entrar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="tabs">
            <button class="tab-btn active" onclick="aba('v')">VISTOS</button>
            <button class="tab-btn" onclick="aba('r')">RELATÓRIO</button>
            <button class="tab-btn" onclick="aba('d')">DIÁRIO</button>
            <button class="tab-btn" onclick="aba('c')">AJUSTES</button>
        </nav>

        <header>
            <div class="controls-grid">
                <select id="turma" onchange="atualizarTudo()" style="grid-column: span 2;">
                    <option value="">Selecione a Turma...</option>
                    <option>9ºA Letramento Digital</option><option>9ºB Pensamento Comp.</option><option>9ºC Letramento Digital</option>
                    <option>9ºD Letramento Digital</option><option>1ºB Sociologia</option><option>1ºB IFA</option>
                    <option>2ºA DG História</option><option>2ºA DG Filosofia</option><option>2ºB Sociologia</option>
                    <option>2ºB DG História</option><option>2ºB DG Filosofia</option><option>2ºC Sociologia</option><option>2ºD Sociologia</option>
                </select>
                <select id="bimestre" onchange="atualizarTudo()">
                    <option value="1B">1º Bimestre</option><option value="2B">2º Bimestre</option>
                    <option value="3B">3º Bimestre</option><option value="4B">4º Bimestre</option>
                </select>
                <input type="date" id="data" onchange="atualizarTudo()">
            </div>
        </header>

        <div class="container">
            <div id="aba-v" class="card">
                <div class="ativ-header" id="header-container">
                    </div>
                <div class="table-container" id="lista">Aguardando...</div>
                <button onclick="salvarVistos()" class="btn-main btn-blue">Salvar Vistos</button>
            </div>

            <div id="aba-r" class="card hidden">
                <h3 style="margin-top:0">Total de Vistos no Bimestre</h3>
                <div id="relatorio-lista">Selecione a turma para consolidar...</div>
            </div>

            <div id="aba-d" class="card hidden">
                <textarea id="cont" placeholder="Conteúdo da aula..." style="width:100%; height:120px; box-sizing:border-box;"></textarea>
                <button onclick="salvarD()" class="btn-main btn-green">Salvar no Diário</button>
                <div id="historico-lista" style="margin-top:20px;"></div>
            </div>

            <div id="aba-c" class="card hidden">
                <textarea id="imp" placeholder="Cole a lista de alunos aqui..." style="width:100%; height:150px; box-sizing:border-box;"></textarea>
                <button onclick="importar()" class="btn-main" style="background:var(--primary); color:white">Importar Lista</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://connect-escolar-fdef0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let numColunas = 5;

        function logar() {
            if(document.getElementById('pass').value === '2203') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else alert('Senha Incorreta!');
        }

        function aba(a) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-'+a).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            if(a === 'r') gerarRelatorio();
        }

        function atualizarTudo() { carregarConfigVistos(); carregarAlunos(); carregarHistorico(); }

        // GERENCIA COLUNAS DINÂMICAS
        function carregarConfigVistos() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref(`headers/${t}/${b}`).once('value', s => {
                const h = s.val() || { h1:'Ativ 1', h2:'Ativ 2', h3:'Ativ 3', h4:'Ativ 4', h5:'Ativ 5' };
                const keys = Object.keys(h);
                numColunas = keys.length;
                renderizarHeaders(h);
            });
        }

        function renderizarHeaders(h) {
            let html = '';
            for(let i=1; i<=numColunas; i++) {
                html += `<input type="text" id="h${i}" value="${h['h'+i] || 'Ativ '+i}" onchange="salvarHeader()">`;
            }
            html += `<button class="btn-add-col" onclick="addColuna()">+</button>`;
            document.getElementById('header-container').innerHTML = html;
        }

        function addColuna() {
            numColunas++;
            salvarHeader();
        }

        function salvarHeader() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            let h = {};
            for(let i=1; i<=numColunas; i++) {
                const val = document.getElementById('h'+i) ? document.getElementById('h'+i).value : 'Ativ '+i;
                h['h'+i] = val;
            }
            db.ref(`headers/${t}/${b}`).set(h).then(() => renderizarHeaders(h));
        }

        function carregarAlunos() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            if(!t) return;
            db.ref('turmas/'+t).once('value', s => {
                const alunos = s.val() || [];
                db.ref(`vistos/${t}/${b}/${d}`).once('value', vsnap => {
                    const salvos = vsnap.val() || {};
                    let h = '<table>';
                    alunos.forEach((n, i) => {
                        h += `<tr><td class="nome-aluno">${n}</td><td style="text-align:right; white-space:nowrap;">`;
                        for(let v=1; v<=numColunas; v++) {
                            const ck = (salvos[i] && salvos[i][v]) ? 'checked' : '';
                            h += `<input type="checkbox" class="aluno-${i}" data-v="${v}" ${ck} style="margin-left:8px;">`;
                        }
                        h += `</td></tr>`;
                    });
                    document.getElementById('lista').innerHTML = h + '</table>';
                });
            });
        }

        function salvarVistos() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            let dados = {};
            document.querySelectorAll('#lista tr').forEach((tr, i) => {
                dados[i] = {};
                tr.querySelectorAll('input').forEach(chk => { dados[i][chk.dataset.v] = chk.checked; });
            });
            db.ref(`vistos/${t}/${b}/${d}`).set(dados).then(() => alert('Salvo!'));
        }

        // RELATÓRIO CONSOLIDADO
        function gerarRelatorio() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            
            db.ref('turmas/'+t).once('value', sAlunos => {
                const alunos = sAlunos.val() || [];
                db.ref(`vistos/${t}/${b}`).once('value', sVistos => {
                    const datas = sVistos.val() || {};
                    let contagem = alunos.map(nome => ({ nome, total: 0 }));
                    
                    Object.values(datas).forEach(dia => {
                        Object.keys(dia).forEach(alunoIdx => {
                            const vistosDoDia = dia[alunoIdx];
                            Object.values(vistosDoDia).forEach(v => { if(v === true) contagem[alunoIdx].total++; });
                        });
                    });

                    let html = '';
                    contagem.forEach(item => {
                        html += `<div class="relatorio-item"><span>${item.nome}</span><span class="badge-vistos">${item.total} vistos</span></div>`;
                    });
                    document.getElementById('relatorio-lista').innerHTML = html || 'Nenhum visto registrado.';
                });
            });
        }

        function carregarHistorico() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref(`diario/${t}/${b}`).on('value', s => {
                const registros = s.val() || {};
                let html = '';
                Object.keys(registros).reverse().forEach(id => {
                    const item = registros[id];
                    html += `<div class="hist-item"><strong>${item.data.split('-').reverse().join('/')}</strong><p>${item.conteudo}</p></div>`;
                });
                document.getElementById('historico-lista').innerHTML = html;
            });
        }

        function salvarD() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            const txt = document.getElementById('cont').value;
            if(!t || !txt) return;
            db.ref(`diario/${t}/${b}/${Date.now()}`).set({ conteudo: txt, data: d }).then(() => {
                alert('Salvo!'); document.getElementById('cont').value = "";
            });
        }

        function importar() {
            const t = document.getElementById('turma').value;
            const raw = document.getElementById('imp').value;
            const nomes = raw.split('\n').map(n => n.replace(/^[0-9\s.\-_()]+/, '').trim().toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase())).filter(n => n.length > 2);
            if(t && nomes.length > 0) db.ref('turmas/'+t).set(nomes).then(() => { alert('Importado!'); atualizarTudo(); });
        }

        document.getElementById('data').valueAsDate = new Date();
    </script>
</body>
</html>
