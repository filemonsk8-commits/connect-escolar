/**
 * Lógica do Sistema
 */
function renderizarSistema() {
    const app = document.getElementById('app');
    let html = '';

    for (const turma in ConnectDB.turmas) {
        html += `
            <div class="turma-card">
                <strong>${turma}</strong> | Alunos: ${ConnectDB.turmas[turma].length}
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Nome do Aluno</th>
                        <th>${ConnectDB.headers[turma]?.h1 || 'Ativ 1'}</th>
                        <th>${ConnectDB.headers[turma]?.h2 || 'Ativ 2'}</th>
                        <th>Notas/Vistos</th>
                    </tr>
                </thead>
                <tbody>
                    ${ConnectDB.turmas[turma].map((nome, index) => {
                        let extra = '';
                        if (turma === "2ºB DG Hist/Filo" && index === 11) {
                            extra = `<span class="badge">Rec. 1ºB: ${ConnectDB.recuperacao[turma].nota}</span>`;[cite: 1]
                        }
                        return `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${nome} ${extra}</td>
                                <td>---</td>
                                <td>---</td>
                                <td>---</td>
                            </tr>
                        `;
                    }).join('')}
                </tbody>
            </table>
            <br>
        `;
    }
    app.innerHTML = html;
}
