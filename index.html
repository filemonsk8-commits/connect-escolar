<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Escolar 3.2 | Prof. Eduardo</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #1e293b; --accent: #3b82f6; --bg: #f8fafc; --card: #ffffff; --text: #334155; --success: #10b981; --rec: #ef4444; --edit: #f59e0b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 40px; }
        #login-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; }
        nav.tabs { display: flex; background: var(--primary); padding: 8px; gap: 5px; position: sticky; top: 0; z-index: 100; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px 10px; border: none; background: transparent; color: #94a3b8; font-weight: 600; font-size: 0.75rem; border-radius: 10px; white-space: nowrap; }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: white; }
        header { background: white; padding: 15px; border-bottom: 1px solid #e2e8f0; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 900px; margin: auto; }
        select, input, textarea { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; font-size: 0.95rem; outline: none; background: #fff; }
        .container { padding: 15px; max-width: 900px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .nome-aluno { font-weight: 500; color: var(--primary); }
        .ativ-header { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 10px; align-items: center; }
        .ativ-header input { font-size: 0.7rem; text-align: center; padding: 8px; min-width: 60px; max-width: 80px; background: #f8fafc; font-weight: bold; }
        .btn-col { border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 18px; cursor: pointer; flex-shrink: 0; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-add { background: var(--accent); }
        .btn-del { background: var(--rec); }
        .btn-main { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-green { background: var(--success); color: white; }
        .btn-red { background: var(--rec); color: white; }
        .hist-item { background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 10px; border-left: 5px solid var(--accent); position: relative; }
        .nota-rec { color: var(--rec); font-weight: bold; border-color: var(--rec) !important; }
        .relatorio-row { display: grid; grid-template-columns: 1fr 100px 100px; align-items: center; padding: 12px; border-bottom: 1px solid #f1f5f9; }
        .rel-header { font-weight: bold; background: #f1f5f9; border-radius: 8px; }
        .badge-rec { color: var(--rec); font-weight: bold; text-align: center; }
        .badge-vistos { font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Connect Escolar 3.2</h2>
            <input type="password" id="pass" placeholder="Senha" style="width:100%; box-sizing:border-box;" onkeydown="if(event.key==='Enter') logar()">
            <button onclick="logar()" class="btn-main btn-blue">Entrar</button>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="tabs">
            <button class="tab-btn active" onclick="aba('v')">VISTOS</button>
            <button class="tab-btn" onclick="aba('r')">RECUPERAÇÃO</button>
            <button class="tab-btn" onclick="aba('l')">RELATÓRIO</button>
            <button class="tab-btn" onclick="aba('d')">DIÁRIO</button>
            <button class="tab-btn" onclick="aba('c')">AJUSTES</button>
        </nav>

        <header>
            <div class="controls-grid">
                <select id="turma" onchange="atualizarTudo()" style="grid-column: span 2;">
                    <option value="">Selecione a Turma...</option>
                    <option>9ºA Letramento Digital</option>
                    <option>9ºB Pensamento Comp.</option>
                    <option>1ºB Sociologia</option>
                    <option>1ºB IFA</option>
                    <option>2º B (Soc)</option>
                    <option>2ºB DG Filosofia</option>
                    <option>2ºB Sociologia</option>
                    <option>2ºC Sociologia</option>
                    <option>2ºD Sociologia</option>
                </select>
                <select id="bimestre" onchange="atualizarTudo()">
                    <option value="1B">1º Bimestre</option>
                    <option value="2B" selected>2º Bimestre</option>
                    <option value="3B">3º Bimestre</option>
                    <option value="4B">4º Bimestre</option>
                </select>
                <input type="date" id="data" onchange="atualizarTudo()">
            </div>
        </header>

        <div class="container">
            <div id="aba-v" class="card">
                <div class="ativ-header" id="header-container"></div>
                <div id="lista">Selecione uma turma...</div>
                <button onclick="salvarVistos()" class="btn-main btn-blue">Salvar Alterações</button>
            </div>

            <div id="aba-r" class="card hidden">
                <h3>Recuperação</h3>
                <div id="lista-rec">Aguardando dados...</div>
                <button onclick="salvarRec()" class="btn-main btn-red">Salvar Notas de Rec.</button>
            </div>

            <div id="aba-l" class="card hidden">
                <h3>Resumo de Notas e Vistos</h3>
                <div id="relatorio-header" class="relatorio-row rel-header">
                    <span>Aluno</span>
                    <span style="text-align:center">Vistos</span>
                    <span style="text-align:center">Recup.</span>
                </div>
                <div id="relatorio-lista">Aguardando...</div>
            </div>

            <div id="aba-d" class="card hidden">
                <textarea id="cont" placeholder="Conteúdo da aula..." style="width:100%; height:120px; box-sizing:border-box;"></textarea>
                <button onclick="salvarD()" class="btn-main btn-green">Salvar no Diário</button>
                <div id="historico-lista" style="margin-top:20px;"></div>
            </div>

            <div id="aba-c" class="card hidden">
                <h3>Ajustes</h3>
                <textarea id="imp" placeholder="Cole a lista aqui..." style="width:100%; height:150px; box-sizing:border-box;"></textarea>
                <button onclick="importar()" class="btn-main" style="background:var(--primary); color:white">Limpar e Importar Alunos</button>
            </div>
        </div>
    </div>

    <script>
        const config = { databaseURL: "https://connect-escolar-fdef0-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database();
        let numColunas = 5;

        function logar() {
            if(document.getElementById('pass').value === '2203') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            } else alert('Senha Incorreta!');
        }

        function aba(a) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('aba-'+a).classList.remove('hidden');
            event.currentTarget.classList.add('active');
            if(a === 'l') gerarRelatorio();
            if(a === 'r') carregarRec();
        }

        function atualizarTudo() { 
            carregarHeaders(); 
            carregarAlunos(); 
            carregarHistorico(); 
            if(!document.getElementById('aba-r').classList.contains('hidden')) carregarRec(); 
        }

        function carregarHeaders() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref(`headers/${t}`).once('value', s => {
                const total = s.val() || {};
                const h = total[b] || total; 
                const keys = Object.keys(h).filter(k => k.startsWith('h'));
                numColunas = keys.length > 0 ? keys.length : 5;
                let html = '';
                for(let i=1; i<=numColunas; i++) {
                    html += `<input type="text" id="h${i}" value="${h['h'+i] || 'Ativ '+i}" onchange="salvarHeader()">`;
                }
                html += `<button class="btn-col btn-add" onclick="addColuna()">+</button>`;
                if(numColunas > 1) html += `<button class="btn-col btn-del" onclick="removerColuna()">-</button>`;
                document.getElementById('header-container').innerHTML = html;
            });
        }

        function carregarAlunos() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            if(!t) return;
            db.ref('turmas/'+t).once('value', sA => {
                const alunos = sA.val() || [];
                db.ref(`vistos/${t}`).once('value', sV => {
                    const totalV = sV.val() || {};
                    const salvos = (totalV[b] && totalV[b][d]) ? totalV[b][d] : (totalV[d] || {});
                    let h = '<table>';
                    alunos.forEach((n, i) => {
                        h += `<tr><td class="nome-aluno">${n}</td><td style="text-align:right; white-space:nowrap;">`;
                        for(let v=1; v<=numColunas; v++) {
                            const ck = (salvos[i] && salvos[i][v]) ? 'checked' : '';
                            h += `<input type="checkbox" class="aluno-${i}" data-v="${v}" ${ck} style="margin-left:8px;">`;
                        }
                        h += `</td></tr>`;
                    });
                    document.getElementById('lista').innerHTML = h + '</table>';
                });
            });
        }

        function salvarVistos() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            if(!t) return;
            let dados = {};
            document.querySelectorAll('#lista tr').forEach((tr, i) => {
                dados[i] = {};
                tr.querySelectorAll('input').forEach(chk => { dados[i][chk.dataset.v] = chk.checked; });
            });
            db.ref(`vistos/${t}/${b}/${d}`).set(dados).then(() => alert('Salvo!'));
        }

        function carregarHistorico() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref(`diario/${t}`).on('value', s => {
                const total = s.val() || {};
                let html = '';
                const base = total[b] || total; 
                Object.keys(base).reverse().forEach(id => {
                    if(["1B", "2B", "3B", "4B"].includes(id)) return;
                    const it = base[id];
                    const dataFormat = it.data ? it.data.split('-').reverse().join('/') : id.split('-').reverse().join('/');
                    html += `<div class="hist-item"><strong>${dataFormat}</strong><p>${it.conteudo || it.conteúdo}</p></div>`;
                });
                document.getElementById('historico-lista').innerHTML = html || "Sem registros.";
            });
        }

        function salvarD() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            const d = document.getElementById('data').value;
            const txt = document.getElementById('cont').value;
            if(!t || !txt) return;
            db.ref(`diario/${t}/${b}/${Date.now()}`).set({ conteudo: txt, data: d }).then(() => {
                alert('Salvo!'); document.getElementById('cont').value = "";
            });
        }

        function addColuna() { numColunas++; salvarHeader(); }
        function removerColuna() { if(numColunas > 1) { numColunas--; salvarHeader(); } }
        
        function salvarHeader() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            let h = {};
            for(let i=1; i<=numColunas; i++) h['h'+i] = document.getElementById('h'+i).value;
            db.ref(`headers/${t}/${b}`).set(h).then(() => carregarHeaders());
        }

        function carregarRec() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref('turmas/'+t).once('value', sA => {
                const alunos = sA.val() || [];
                db.ref(`recuperacao/${t}/${b}`).once('value', sR => {
                    const notas = sR.val() || {};
                    let h = '<table>';
                    alunos.forEach((n, i) => {
                        h += `<tr><td class="nome-aluno">${n}</td><td style="text-align:right">
                            <input type="text" class="nota-rec" data-idx="${i}" value="${notas[i] || ''}" style="width:60px; text-align:center;">
                            </td></tr>`;
                    });
                    document.getElementById('lista-rec').innerHTML = h + '</table>';
                });
            });
        }

        function salvarRec() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            let r = {};
            document.querySelectorAll('.nota-rec').forEach(inp => { if(inp.value) r[inp.dataset.idx] = inp.value; });
            db.ref(`recuperacao/${t}/${b}`).set(r).then(() => alert('Salvo!'));
        }

        function gerarRelatorio() {
            const t = document.getElementById('turma').value;
            const b = document.getElementById('bimestre').value;
            if(!t) return;
            db.ref('turmas/'+t).once('value', sA => {
                const alunos = sA.val() || [];
                db.ref(`vistos/${t}/${b}`).once('value', sV => {
                    db.ref(`recuperacao/${t}/${b}`).once('value', sR => {
                        const dias = sV.val() || {};
                        const notasRec = sR.val() || {};
                        let cont = alunos.map(n => ({ n, total: 0 }));
                        Object.values(dias).forEach(dia => {
                            Object.keys(dia).forEach(idx => {
                                Object.values(dia[idx]).forEach(v => { if(v === true) cont[idx].total++; });
                            });
                        });
                        let html = '';
                        cont.forEach((it, i) => { 
                            html += `<div class="relatorio-row"><span class="nome-aluno">${it.n}</span><span class="badge-vistos">${it.total} vistos</span><span class="badge-rec">${notasRec[i] || '-'}</span></div>`; 
                        });
                        document.getElementById('relatorio-lista').innerHTML = html;
                    });
                });
            });
        }

        function importar() {
            const t = document.getElementById('turma').value;
            const raw = document.getElementById('imp').value;
            if(!t || !raw) return;
            const nomes = raw.split('\n').map(n => n.replace(/^[0-9\s.\-_()]+/, '').trim().toLowerCase().replace(/(^\w|\s\w)/g, m => m.toUpperCase())).filter(n => n.length > 2);
            db.ref('turmas/'+t).set(nomes).then(() => { alert('Importado!'); carregarAlunos(); });
        }
        document.getElementById('data').valueAsDate = new Date();
    </script>
</body>
</html>
